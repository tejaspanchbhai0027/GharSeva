# A generic, single database configuration.

[alembic]
# path to migration scripts
script_location = migrations

# template used to generate migration file names; the default template is standard.
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file as well as the filename.
# string_value is passed to dateutil.tz.gettz() or pytz.timezone().
# timezone =

# max length of characters to use for the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during
# the 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be imported from the current directory
# prepend_sys_path = true

# version location specification; this defaults to migrations/versions.
# When using multiple version directories, initial migrations must be run with --version-path.
# version_locations = %(here)s/bar:%(here)s/bat:migrations/versions

# version_path_separator = :

# set to 'true' to search for newer versions in the version locations
# recursive_version_locations = false

# the database url is normally set dynamically in env.py from settings
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/gharseva

[post_write_hooks]
# post_write_hooks defines scripts or Python functions that are run
# after a new migration script is generated.

# format using "black" developer utility
# hooks = black
# black.type = console_scripts
# black.entrypoint = black
# black.options = -l 79 REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
